<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Light Snail</title>
    <meta
      name="description"
      content="A tiny mobile-first web toy where a cute snail slowly crawls around and zips away when tapped."
    />
    <meta name="lightsnail-source" content="github.com/apelosi/lightsnail" />
    <link rel="stylesheet" href="./styles.css?v=2026-04-16-03" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="app-header__top">
          <div class="app-header__left">
            <h1>Light Snail</h1>
            <p id="status" class="status-text" aria-live="polite">Slow and shiny.</p>
          </div>
          <div class="controls" aria-label="Controls">
            <button id="soundToggle" class="toggle" type="button" aria-pressed="false">
              Sound: Off
            </button>
          </div>
        </div>
      </header>

      <main id="stage" class="stage" aria-label="Snail playground">
        <div id="effects" class="effects" aria-hidden="true"></div>

        <button id="snail" class="snail" type="button" aria-label="Tap the snail">
          <span class="snail-face">🐌</span>
          <span class="sleep-bubble" aria-hidden="true">💤</span>
        </button>
      </main>

      <p class="deploy-marker" id="deployMarker">
        Source: <span class="deploy-marker__repo">github.com/apelosi/lightsnail</span> · build marker
        <span class="deploy-marker__id">2026-04-16-03</span>
      </p>
    </div>

    <script src="./app.js?v=2026-04-16-03"></script>
  </body>
</html>
